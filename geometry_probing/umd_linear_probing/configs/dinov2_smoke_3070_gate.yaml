dataset:
  root: ../../datasets/UMD/part-affordance-dataset
  split_path: metadata/splits/category_split_seed42_v20_smoke.json
  num_classes: 8
  ignore_index: 255
  min_patch_coverage: 0.55
  exclude_background: false
  metric_ignore_indices: [0]
  pad_to_patch_multiple: true
  geometry:
    manifest_path: metadata/splits/smoke_metric3d_predictions.json
    use_depth: true
    use_normal: true
    normalization:
      mode: per_image_percentile
      depth:
        percentiles: {low: 2.0, high: 98.0}
    pool: {kernel: 14, stride: 14}

model:
  target: dinov2
  params:
    name: dinov2_vitb14
    repo_path: ../../models/dinov2
    checkpoint_path: ../../models/dinov2_vitb14_pretrain.pth
    patch_size: 14
    layers_to_hook: [2, 5, 8, 11]
    primary_layer: 2
    head:
      type: multi_layer_linear
      feature_keys: [2, 5, 8, 11]
      primary_key: 2
      fuse_mode: concat
      use_batchnorm: true
      dropout: 0.0
      use_geometry_gate: true
      geometry_key: geom_depth
    output_dir_name: DINOv2_smoke_gate_3070

training:
  batch_size: 1
  num_workers: 0
  max_epochs: 1
  patience: 1
  lr_grid: [0.001]
  weight_decay_grid: [0.01]
  grad_clip_norm: 1.0
  eval_interval: 1
  log_interval: 1
  val_log_interval: 1
  device: cuda
  precision: fp32
  output_root: outputs
  seed: 1337
  accumulate_grad_batches: 1
