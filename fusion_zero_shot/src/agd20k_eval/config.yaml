dataset_root: ../../../datasets/AGD20K/AGD20K/Unseen/testset
model_dir: ../../../models/FLUX.1-Kontext-dev
output_root: ../../../outputs/fusion_zero_shot
num_inference_steps: 20
guidance_scale: 2.5
seed: 3
height: null   # Use model-adaptive size by default; override with an integer multiple of 16
width: null
max_area: null # Optional diffusers Kontext max_area override; null keeps the pipeline default 1024^2
match_input_resolution: true  # If true, automatically match Kontext recommended resolution to input image size
gpus: ["cuda:0"]
enable_model_cpu_offload: false  # Set true for low-VRAM GPUs; default keeps the original eager CUDA placement
enable_sequential_cpu_offload: false  # Lower VRAM than model offload, but much slower
affordances: null
  #- sip
  # For subset evaluation, list affordances such as ['hold', 'cut', ...]
max_images_per_object: null  # Optional integer cap for number of samples per object
token_selection: "auto"  # auto: match tokens from prompt_templates
save_intermediate: false  # If true, save intermediate Kontext logs
resume: true  # If outputs/<exp_id> exists, decide whether to skip completed samples
resume_run_dir: null  # Optional existing output directory (absolute or relative to output_root) for resume
reuse_kontext_run_dir: null  # Optional existing run directory whose per-sample Kontext heatmaps are reused

geom_pipeline:
  enable: true
  dino_backend: dinov3  # dinov3 | dinov2
  dino_target_wh: null  # e.g. [1260, 980] for DINOv2; null uses backend default
  dino_patch_size: null # e.g. 14 for DINOv2; null uses backend default
  dino_cache_only: true # require cache hit; avoids loading DINO model on GPU
  cache_root: ../../../outputs/fusion_cache
  roi_percentile: 80.0
  token_threshold: 0.1
  disable_object_roi: false
  pca_components: 5
  geom_sigma: 1.2
  geom_threshold: 0.7
  geom_soft_fusion: true
  geom_soft_lambda: 0.65
  geom_soft_gamma: 0.7
  geom_soft_temperature: [0.30, 0.40, 0.50, 0.60]
  geom_soft_base: 0
  geom_soft_log1p: false
  geom_adaptive_fusion: false
  geom_gate_min_lambda: 0.35
  geom_gate_max_lambda: 0.85
  geom_gate_verb_weight: 0.45
  geom_gate_geometry_weight: 0.35
  geom_gate_alignment_weight: 0.20
  geom_gate_similarity_floor: null
  geom_gate_fallback_lambda: null
  geom_sim_use_nss: true
  geom_sim_topk_percent: 5.0
  geom_sim_nss_weight: 1.0
  geom_sim_topk_weight: 0.0
  fusion_thresholds: [0.30, 0.40, 0.50]
  keep_largest: true
